<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Tailor Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo-container">
                <div class="logo-icon"><i class="fas fa-scissors"></i></div>
                <span class="logo-text">ELITE TAILORS</span>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="customers.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="measurements.html" class="nav-item">
                    <i class="fas fa-ruler-combined"></i>
                    <span>Measurements</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Orders</span>
                </a>
                <a href="invoices.html" class="nav-item">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Invoices</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <div class="sidebar-toggle" id="sidebarToggle">
                        <i class="fas fa-bars"></i>
                    </div>
                    <h2 class="page-title">Dashboard Overview</h2>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search orders...">
                    </div>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=D4AF37&color=000" alt="Admin">
                        <span>Admin</span>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="card stat-card">
                        <div class="stat-icon" style="background: rgba(212, 175, 55, 0.1); color: var(--primary-gold);">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Total Customers</h3>
                            <p id="totalCustomers">0</p>
                        </div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon" style="background: rgba(33, 150, 243, 0.1); color: #2196F3;">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Total Orders</h3>
                            <p id="totalOrders">0</p>
                        </div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon" style="background: rgba(255, 152, 0, 0.1); color: #FF9800;">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Pending Orders</h3>
                            <p id="pendingOrders">0</p>
                        </div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon" style="background: rgba(76, 175, 80, 0.1); color: #4CAF50;">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="stat-info">
                            <h3>Total Revenue</h3>
                            <p id="totalRevenue">$0.00</p>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <!-- Recent Orders -->
                    <div class="card grid-item">
                        <div class="card-header">
                            <h3>Recent Orders</h3>
                            <a href="orders.html" class="btn-text">View All</a>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                               <thead>
                                   <tr>
                                       <th>ID</th>
                                       <th>Customer</th>
                                       <th>Status</th>
                                       <th>Amount</th>
                                   </tr>
                               </thead>
                               <tbody id="recentOrdersTable">
                                   <!-- Filled by JS -->
                               </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Order Analytics (Canvas) -->
                    <div class="card grid-item">
                        <div class="card-header">
                            <h3>Order Status Overview</h3>
                        </div>
                        <div class="chart-container">
                            <canvas id="statusChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid second-row">
                    <!-- Recent Customers -->
                    <div class="card grid-item">
                        <div class="card-header">
                            <h3>New Customers</h3>
                            <a href="customers.html" class="btn-text">View All</a>
                        </div>
                        <div class="customer-list" id="recentCustomersList">
                            <!-- Filled by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // Basic Check for Auth
        if (!Storage.getCurrentUser()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
